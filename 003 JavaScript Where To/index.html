<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Where To</title>
    <script>
        // Java Script In Head
        function TextChanges()
        {
        document.getElementById("text-changed").innerText = "Text Changed"
        }
    </script>
</head>
<body>
    <p id="text-changed">my para</p>
    <button onclick="TextChanges()">Click to change the text</button>
    <script>

        // }

    </script>
    <!-- External JavaScript -->
    <script src="./index.js"></script>
</body>
</html>

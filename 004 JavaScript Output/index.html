<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Output</title>
</head>
<body>
    <p id="para">This is inside the paragraph </p>
    <p id="para2"> </p>
    <p id="para3"> </p>
    <!-- Example of document.write -->
    <button type="button" onclick="document.write(5 + 6)">Try it</button>
    <!-- Example of window.print -->
    <button type="button" onclick="window.print(5 + 6)">print</button>



    <script>
        // Example of InnerHTML
        document.getElementById("para2").innerHTML = "<h1>heading innerHTML</h1>"
        // Example of InnerText
        document.getElementById("para3").innerText = "Para InnerTEXT"
        // Example of document.write()
        document.write(11+20)
         // Example of window.alert()
        //  window.alert(Date())
          // Example of console.log()
          console.log(5+6);
          


          
    </script>
</body>
</html>
